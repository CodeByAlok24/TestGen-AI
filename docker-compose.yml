version: '3.9'
services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: testgen
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - '5432:5432'
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    ports:
      - '6379:6379'

  backend:
    build: ./backend
    ports:
      - '8000:8000'
    env_file: .env
    environment:
      PORT: 8000
      POSTGRES_HOST: postgres
      POSTGRES_PORT: 5432
      POSTGRES_DB: testgen
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      DATABASE_URL: postgresql://postgres:postgres@postgres:5432/testgen
      REDIS_URL: redis://redis:6379
      CLIENT_URL: http://localhost:5173
      JWT_SECRET: dev-jwt-secret
      LLM_PROVIDER: mock
    depends_on:
      - postgres
      - redis

  frontend:
    build: ./frontend
    ports:
      - '5173:5173'
    environment:
      VITE_API_BASE: http://backend:8000/api
    depends_on:
      - backend
    command: sh -c "npm install && npm run dev -- --host 0.0.0.0 --port 5173"

volumes:
  postgres_data:

