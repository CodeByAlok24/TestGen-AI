version: '3.9'
services:
  mongo:
    image: mongo:7-alpine
    environment:
      MONGO_INITDB_ROOT_USERNAME: root
      MONGO_INITDB_ROOT_PASSWORD: root
      MONGO_INITDB_DATABASE: testgen
    ports:
      - '27017:27017'
    volumes:
      - mongo_data:/data/db

  backend:
    build: ./backend
    ports:
      - '8000:8000'
    env_file: .env
    environment:
      PORT: 8000
      MONGO_URL: mongodb://root:root@mongo:27017
      MONGO_DB: testgen
      CLIENT_URL: http://localhost:5173
      JWT_SECRET: dev-jwt-secret
      LLM_PROVIDER: mock
    depends_on:
      - mongo

  frontend:
    build: ./frontend
    ports:
      - '5173:5173'
    environment:
      VITE_API_BASE: http://backend:8000/api
    depends_on:
      - backend
    command: sh -c "npm install && npm run dev -- --host 0.0.0.0 --port 5173"

volumes:
  mongo_data:

